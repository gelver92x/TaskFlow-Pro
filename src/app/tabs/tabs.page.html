<!-- Navegación principal con pestañas (OBLIGATORIO: ion-tabs + ion-tab-bar) -->
<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="tasks">
      <ion-icon name="list-outline"></ion-icon>
      <ion-label>{{ 'tabs.tasks' | translate }}</ion-label>
    </ion-tab-button>

    <!-- Pestaña de categorías — controlada por feature flag -->
    <ion-tab-button tab="categories" *ngIf="showCategories">
      <ion-icon name="pricetags-outline"></ion-icon>
      <ion-label>{{ 'tabs.categories' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="settings">
      <ion-icon name="settings-outline"></ion-icon>
      <ion-label>{{ 'tabs.settings' | translate }}</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
